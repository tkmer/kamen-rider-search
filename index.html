<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仮面ライダー 検索ツール</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#1a1a22;--bg3:#22222e;--border:#2e2e3e;
  --text:#e8e8f0;--text2:#9999b0;--text3:#5a5a70;
  --accent:#c8102e;--accent2:#ff3355;
  --showa:#7c5cfc;--showa-bg:#1e1830;
  --heisei:#2e8fff;--heisei-bg:#0f1e30;
  --reiwa:#22c97a;--reiwa-bg:#0a2218;
  --hl:#ffd43b;--hl-text:#1a1400;
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;min-height:100vh}

/* HEADER */
.site-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto}
.site-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.site-title span{color:var(--accent2)}
.search-wrap{display:flex;gap:8px}
.search-box{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 14px 0 36px;height:40px;color:var(--text);font-size:14px;position:relative;transition:border-color .15s}
.search-wrap .si{position:relative;flex:1;display:flex;align-items:center}
.search-wrap .si i{position:absolute;left:10px;color:var(--text3);font-size:16px;pointer-events:none}
.search-box:focus{outline:none;border-color:var(--accent2)}
.search-box::placeholder{color:var(--text3)}
.clear-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;height:40px;color:var(--text2);cursor:pointer;font-size:13px;white-space:nowrap;transition:border-color .15s}
.clear-btn:hover{border-color:var(--text2)}

/* FILTER CHIPS */
.filter-bar{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.era-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.era-chip.all.active{border-color:var(--text);color:var(--text);background:var(--bg3)}
.era-chip.showa.active{border-color:var(--showa);color:var(--showa);background:var(--showa-bg)}
.era-chip.heisei.active{border-color:var(--heisei);color:var(--heisei);background:var(--heisei-bg)}
.era-chip.reiwa.active{border-color:var(--reiwa);color:var(--reiwa);background:var(--reiwa-bg)}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.stats-label{font-size:12px;color:var(--text3);margin-left:auto}

/* FUZZY HINT */
.fuzzy-hint{max-width:1200px;margin:0 auto;padding:0 20px 8px;font-size:12px;color:var(--text3);min-height:20px}
.fuzzy-hint span{color:var(--heisei)}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:0 20px 40px;display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
@media(max-width:900px){main{grid-template-columns:1fr}}

/* GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.rider-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;overflow:hidden}
.rider-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.rider-card.active{border-color:var(--accent2);background:var(--bg3)}
.card-thumb{height:110px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;background:var(--bg3)}
.era-dot{position:absolute;top:7px;right:7px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.era-dot.showa{background:var(--showa-bg);color:var(--showa);border:1px solid var(--showa)}
.era-dot.heisei{background:var(--heisei-bg);color:var(--heisei);border:1px solid var(--heisei)}
.era-dot.reiwa{background:var(--reiwa-bg);color:var(--reiwa);border:1px solid var(--reiwa)}
.card-body{padding:9px 11px}
.card-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:2px}
.card-sub{font-size:11px;color:var(--text3)}

/* DETAIL PANEL */
.detail-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:sticky;top:80px}
.detail-panel.empty{display:flex;align-items:center;justify-content:center;min-height:300px;color:var(--text3);font-size:13px;text-align:center}
.detail-icon{font-size:80px;text-align:center;padding:16px 0;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:14px}
.detail-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.detail-meta{font-size:12px;color:var(--text2);margin-bottom:12px}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.info-grid{display:grid;gap:8px}
.info-item{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px}
.info-label{font-size:11px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.info-value{font-size:13px;color:var(--text)}

/* EMPTY */
.empty-msg{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3)}
.empty-msg i{font-size:40px;display:block;margin-bottom:12px;color:var(--text3)}
.empty-msg p{font-size:14px}

/* HIGHLIGHT */
mark{background:var(--hl);color:var(--hl-text);border-radius:2px;padding:0 2px}

/* SCROLL */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-title"><i class="ti ti-shield-half-filled"></i>仮面ライダー<span>検索ツール</span></div>
    <div class="search-wrap">
      <div class="si">
        <i class="ti ti-search"></i>
        <input class="search-box" id="q" type="text" placeholder="例: バッタ、変身、昭和、翔一郎、黒い虫、怪人退治…" oninput="onSearch()">
      </div>
      <button class="clear-btn" onclick="clearSearch()"><i class="ti ti-x"></i> クリア</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <button class="era-chip all active" id="chip-all" onclick="setEra('all')">すべて</button>
  <button class="era-chip showa" id="chip-昭和" onclick="setEra('昭和')">昭和</button>
  <button class="era-chip heisei" id="chip-平成" onclick="setEra('平成')">平成</button>
  <button class="era-chip reiwa" id="chip-令和" onclick="setEra('令和')">令和</button>
  <div class="filter-sep"></div>
  <span class="stats-label" id="stats"></span>
</div>

<div class="fuzzy-hint" id="hint"></div>

<main>
  <div>
    <div class="card-grid" id="grid"></div>
  </div>
  <div class="detail-panel empty" id="panel">
    <div><i class="ti ti-hand-click" style="font-size:32px;display:block;margin-bottom:8px;color:var(--text3)"></i>ライダーを選択してください</div>

</main>

// クエリを類推ワードに展開
function expandQuery(q) {
  const words = q.trim().split(/[\s　,、]+/).filter(Boolean);
  const expanded = new Set(words);
  words.forEach(w => {
    const lower = w.toLowerCase();
    Object.keys(SYNONYMS).forEach(key => {
      if(key.toLowerCase().includes(lower) || lower.includes(key.toLowerCase())) {
        SYNONYMS[key].forEach(s => expanded.add(s));
      }
    });
  });
  return Array.from(expanded).join(' ');
}

// ─── Fuse.js 設定 ─────────────────────────────────────────────
const FUSE_OPTS = {
  keys:[
    {name:'name', weight:0.3},
    {name:'rider', weight:0.2},
    {name:'catchphrase', weight:0.2},
    {name:'song', weight:0.15},
    {name:'features', weight:0.2},
    {name:'motif', weight:0.2},
    {name:'colors', weight:0.15},
    {name:'tags', weight:0.25},
    {name:'series', weight:0.1},
  ],
  threshold: 0.45,
  includeScore: true,
  minMatchCharLength: 1,
  ignoreLocation: true,
};
let fuse = new Fuse(DB, FUSE_OPTS);

// ─── State ──────────────────────────────────────────────────
let activeEra = 'all';
let selectedId = null;
let expandedTerms = [];

function eraClass(e){ return {昭和:'showa',平成:'heisei',令和:'reiwa'}[e]||'showa'; }

function hl(text, q){
  if(!q || !text) return text || '';
  const terms = q.split(/\s+/).filter(Boolean);
  let out = text;
  terms.forEach(t => {
    if(!t) return;
    const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    out = out.replace(re, m => `<mark>${m}</mark>`);
  });
  return out;
}

function onSearch(){
  selectedId = null;
  renderPanel();
  renderGrid();
}

function clearSearch(){
  document.getElementById('q').value = '';
  onSearch();
}

function setEra(e){
  activeEra = e;
  document.querySelectorAll('.era-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + (e==='all'?'all':e)).classList.add('active');
  renderGrid();
}

function getResults(){
  const raw = document.getElementById('q').value.trim();
  let results;

  if(!raw){
    expandedTerms = [];
    results = DB.map(r => ({item:r, score:1}));
  } else {
    const expanded = expandQuery(raw);
    expandedTerms = expanded.split(' ').filter(t => !raw.split(/\s+/).includes(t));
    results = fuse.search(expanded);
    if(!results.length && raw !== expanded) {
      results = fuse.search(raw);
    }
  }

  if(activeEra !== 'all'){
    results = results.filter(r => r.item.era === activeEra);
  }
  return results;
}

function renderHint(){
  const hint = document.getElementById('hint');
  const raw = document.getElementById('q').value.trim();
  if(raw && expandedTerms.length){
    hint.innerHTML = `<i class="ti ti-bulb" style="color:var(--heisei)"></i> 類推キーワード追加: <span>${expandedTerms.slice(0,8).join('、')}</span>`;
  } else {
    hint.innerHTML = '';
  }
}

function renderGrid(){
  const results = getResults();
  renderHint();
  const raw = document.getElementById('q').value.trim();
  const expanded = raw ? expandQuery(raw) : '';
  document.getElementById('stats').textContent = `${results.length} 件 / 全 ${DB.length} 件`;

  const grid = document.getElementById('grid');
  if(!results.length){
    grid.innerHTML = `<div class="empty-msg"><i class="ti ti-mood-sad"></i><p>該当する仮面ライダーが見つかりません</p></div>`;
    return;
  }
  grid.innerHTML = results.map(({item:r}) => `
    <div class="rider-card${selectedId===r.id?' active':''}" onclick="selectRider(${r.id})">
      <div class="card-thumb">
        <span>${r.emoji}</span>
        <span class="era-dot ${eraClass(r.era)}">${r.era}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${hl(r.name, expanded)}</div>
        <div class="card-sub">${r.year}年</div>
      </div>
    </div>`).join('');
}

function selectRider(id){
  selectedId = id;
  renderGrid();
  renderPanel();
}

function renderPanel(){
  const panel = document.getElementById('panel');
  const raw = document.getElementById('q').value.trim();
  const expanded = raw ? expandQuery(raw) : '';

  if(!selectedId){
    panel.className = 'detail-panel empty';
    panel.innerHTML = '<div><i class="ti ti-hand-click" style="font-size:32px;display:block;margin-bottom:8px;color:var(--text3)"></i>ライダーを選択してください</div>';
    return;
  }
  const r = DB.find(x => x.id === selectedId);
  if(!r){ return; }
  panel.className = 'detail-panel';
  panel.innerHTML = `
    <div class="detail-icon">${r.emoji}</div>
    <div class="detail-name">${hl(r.name, expanded)}</div>
    <div class="detail-meta">${r.series}（${r.year}年）</div>
    <div class="tag-row">
      <span class="era-dot ${eraClass(r.era)}" style="position:static">${r.era}</span>
      <span class="tag">${r.motif}</span>
      <span class="tag">${r.colors}</span>
    </div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label"><i class="ti ti-user"></i> 変身者</div>
        <div class="info-value">${hl(r.rider, expanded)}</div>
      </div>
      <div class="info-item">
        <div class="info-label"><i class="ti ti-palette"></i> カラー</div>
        <div class="info-value">${hl(r.colors, expanded)}</div>
      </div>
      <div class="info-item" style="grid-column:1/-1">
        <div class="info-label"><i class="ti ti-message-circle"></i> 決め台詞</div>
        <div class="info-value">${hl(r.catchphrase||'—', expanded)}</div>
      </div>
      <div class="info-item" style="grid-column:1/-1">
        <div class="info-label"><i class="ti ti-music"></i> 主題歌</div>
        <div class="info-value">${hl(r.song, expanded)}</div>
      </div>
      <div class="info-item" style="grid-column:1/-1">
        <div class="info-label"><i class="ti ti-eye"></i> 外見・特徴</div>
        <div class="info-value">${hl(r.features, expanded)}</div>
      </div>
    </div>`;
}

renderGrid();
</script>
